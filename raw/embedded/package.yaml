name: haskell-template-task-embedded
ghc-options:
  -Wall
flags:
  iotasks:
    description: enables test helpers for IOTasks
    manual: True
    default: True
dependencies:
  - base
  - deepseq
  - haskell-src-exts
  - HUnit
  - QuickCheck
  - random
  - syb
library:
  source-dirs:
    - src
  other-modules:
    - TestHarness
    - TestHelper
when:
  - condition: flag(iotasks)
    then:
      source-dirs:
        - Complete
      dependencies:
        - IOTasks
    else:
      source-dirs:
        - Minimal
